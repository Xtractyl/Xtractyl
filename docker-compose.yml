services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - ROLLUP_USE_NODE_BUILTINS=${ROLLUP_USE_NODE_BUILTINS:-true}
      - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
      - CAPTURE_FIXTURES=${CAPTURE_FIXTURES:-0}
      - SYNTHETIC_DATA=${SYNTHETIC_DATA:-0}
    working_dir: /app

  postgres:
    image: postgres@sha256:c189d272e4fcdd1ac419adee675d30be3d389c22ee770d593f15819d22a68a0d
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${PGDATA_VOLUME:-pgdata}:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dbname}
      POSTGRES_USER: ${POSTGRES_USER:-username}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-username} -d ${POSTGRES_DB:-dbname}"]
      interval: 5s
      retries: 5
      timeout: 5s

  labelstudio:
    image: heartexlabs/label-studio@sha256:046db042674bca7e9535b7c3a9688683405d4cbf37114cc0e3a0d5dd85de0e7a
    container_name: ${LABELSTUDIO_CONTAINER_NAME:-labelstudio}
    ports:
      - "${LABELSTUDIO_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LABELSTUDIO_DATA_VOLUME:-labelstudio_data}:/label-studio/data
    environment:
      - COLLECT_ANALYTICS=0
      - FRONTEND_SENTRY_DSN=
      - SENTRY_DSN=
      - DJANGO_DB=${DJANGO_DB:-default}
      - POSTGRE_NAME=${POSTGRES_DB:-dbname}
      - POSTGRE_USER=${POSTGRES_USER:-username}
      - POSTGRE_PASSWORD=${POSTGRES_PASSWORD:-yourpassword}
      - POSTGRE_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      - POSTGRE_HOST=${POSTGRES_SERVICE_NAME:-postgres}

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    container_name: ${ORCH_CONTAINER_NAME:-orchestrator}
    depends_on:
      labelstudio:
        condition: service_started
      ml_backend:
        condition: service_healthy
      postgres_xtractyl:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${ORCH_PORT:-5001}:5001"
    volumes:
      - ${PROJECTS_DIR:-./data/projects}:/app/data/projects
      - ${PDFS_DIR:-./data/pdfs}:/app/data/pdfs
      - ${HTMLS_DIR:-./data/htmls}:/app/data/htmls
      - ${EVAL_DIR:-./data/evaluation}:/app/data/evaluation
      - ${RESULTS_DIR:-./data/results}:/app/data/results
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${DEV_LOGS_DIR:-./data/logs}:/app/data/logs
      - ${FIXTURES_DIR:-./data/fixtures}:/app/data/fixtures
      - ${DRIFT_DIR:-./data/evaluation_drift}:/app/data/evaluation_drift
      - ./orchestrator/alembic/versions:/app/alembic/versions

    environment:
      - SERVICE_NAME=orchestrator
      - GROUNDTRUTH_QAL_DIR=/app/data/projects/Evaluation_Sets_Do_Not_Delete
      - PROJECTS_DIR=/app/data/projects
      - PDFS_DIR=/app/data/pdfs
      - HTMLS_DIR=/app/data/htmls
      - RESULTS_DIR=/app/data/results     
      - EVAL_DIR=/app/data/evaluation
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
      - LOGS_DIR=/app/logs
      - DEV_LOGS_DIR=/app/data/logs
      - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
      - CAPTURE_FIXTURES=${CAPTURE_FIXTURES:-0}
      - SYNTHETIC_DATA=${SYNTHETIC_DATA:-0}
      - FIXTURES_DIR=/app/data/fixtures
      - DRIFT_DIR=/app/data/evaluation_drift
      - DATABASE_URL=postgresql://${POSTGRES_XTRACTYL_USER:-xtractyl}:${POSTGRES_XTRACTYL_PASSWORD:-yourpassword}@${POSTGRES_XTRACTYL_CONTAINER_NAME:-postgres_xtractyl}:5432/${POSTGRES_XTRACTYL_DB:-xtractyl}
      - MINIO_CONTAINER_NAME=${MINIO_CONTAINER_NAME:-minio}
      - MINIO_API_PORT=${MINIO_API_PORT:-9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-yourpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-xtractyl}
      - MINIO_PRESIGN_EXPIRY_SECONDS=${MINIO_PRESIGN_EXPIRY_SECONDS:-3600}

  ml_backend:
    build:
      context: .
      dockerfile: docker/ml_backend/Dockerfile
    container_name: ${ML_BACKEND_CONTAINER_NAME:-ml_backend}
    ports:
      - "${ML_BACKEND_PORT:-6789}:${ML_BACKEND_INTERNAL_PORT:-6789}"
    depends_on:
      - labelstudio
      - ollama
    volumes:
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${DEV_LOGS_DIR:-./data/logs}:/app/data/logs 
    environment:
    - SERVICE_NAME=ml_backend
    - ML_BACKEND_PORT=${ML_BACKEND_PORT:-6789}
    - ML_BACKEND_INTERNAL_PORT=${ML_BACKEND_INTERNAL_PORT:-6789}
    - FRONTEND_PORT=${FRONTEND_PORT:-5173}
    - LABELSTUDIO_HOST=labelstudio        
    - LABELSTUDIO_PORT=${LABELSTUDIO_PORT:-8080}
    - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
    - CAPTURE_FIXTURES=${CAPTURE_FIXTURES:-0}
    - SYNTHETIC_DATA=${SYNTHETIC_DATA:-0}
    - LOGS_DIR=/app/logs        
    - DEV_LOGS_DIR=/app/data/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ML_BACKEND_INTERNAL_PORT:-6789}/health"]
      interval: 10s
      timeout: 5s
      retries: 60

  ollama:
    image: ollama/ollama@sha256:3ca37ec2b9cb6341b62554074205c616778fe98abcf9e4fc50361b79a07407ae
    container_name: ${OLLAMA_CONTAINER_NAME:-ollama}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${OLLAMA_MODELS_VOLUME:-ollama_models}:/root/.ollama

  docling:
    build:
      context: .
      dockerfile: docker/docling/Dockerfile
    container_name: ${DOCLING_CONTAINER_NAME:-docling}
    ports:
      - "${DOCLING_PORT:-5004}:${DOCLING_PORT:-5004}"
    volumes:
      - ${PDFS_DIR:-./data/pdfs}:/pdfs
      - ${DOC_HTMLS_DIR:-./data/htmls}:/htmls
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${DEV_LOGS_DIR:-./data/logs}:/app/data/logs
      - ${FONTCACHE_VOLUME:-fontcache}:/var/cache/fontconfig
      - ${XDG_CACHE_VOLUME:-xdg_cache}:/root/.cache
      - ${XDG_DATA_VOLUME:-xdg_data}:/root/.local/share
    environment:
      - SERVICE_NAME=docling
      - LOGS_DIR=/app/logs
      - DEV_LOGS_DIR=/app/data/logs
      - XDG_CACHE_HOME=${XDG_CACHE_HOME:-/root/.cache}
      - XDG_DATA_HOME=${XDG_DATA_HOME:-/root/.local/share}
      - DOCLING_PORT=${DOCLING_PORT:-5004}
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
      - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
      - CAPTURE_FIXTURES=${CAPTURE_FIXTURES:-0}
      - SYNTHETIC_DATA=${SYNTHETIC_DATA:-0}
    command: ["sh", "-c", "flask run --host=0.0.0.0 --port=$DOCLING_PORT"]

  job_queue:
    image: redis@sha256:d7432711a2a5c99c2e9dd0e006061cd274d7cb7a9e77f07ffe2ea99e21244677
    container_name: ${JOB_QUEUE_CONTAINER_NAME:-job_queue}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${REDIS_DATA_VOLUME:-redis_data}:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker_prelabel:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: ${WORKER_PRELABEL_CONTAINER_NAME:-worker_prelabel}
    depends_on:
      job_queue:
        condition: service_healthy
      ml_backend:
        condition: service_started
    volumes:
      - ./worker:/app/worker
      - ${PROJECTS_DIR:-./data/projects}:/app/data/projects
      - ${HTMLS_DIR:-./data/htmls}:/app/data/htmls
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${DEV_LOGS_DIR:-./data/logs}:/app/data/logs
    environment:
      - SERVICE_NAME=worker_pre_label
      - LOGS_DIR=/app/logs       
      - DEV_LOGS_DIR=/app/data/logs 
      - LLM_TIMEOUT=${LLM_TIMEOUT:-20}
      - LLM_OVERHEAD=${LLM_OVERHEAD:-5}
      - UPLOAD_MARGIN=${UPLOAD_MARGIN:-30}
      - OLLAMA_BASE=${OLLAMA_BASE:-http://ollama:11434}
      - REDIS_HOST=${REDIS_HOST:-job_queue}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - LS_HOST=labelstudio
      - LS_PORT=${LABELSTUDIO_PORT:-8080}
      - ML_BACKEND_HOST=ml_backend
      - ML_BACKEND_PORT=${ML_BACKEND_INTERNAL_PORT:-6789}
      - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
      - CAPTURE_FIXTURES=${CAPTURE_FIXTURES:-0}
      - SYNTHETIC_DATA=${SYNTHETIC_DATA:-0}


  worker_conversion:
    build:
      context: .
      dockerfile: docker/worker_conversion/Dockerfile
    container_name: worker_conversion
    depends_on:
      job_queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres_xtractyl:
        condition: service_healthy
      orchestrator:
        condition: service_started
    volumes:
     - ${LOGS_DIR:-./logs}:/app/logs
     - ${DEV_LOGS_DIR:-./data/logs}:/app/data/logs
    environment:
      - SERVICE_NAME=worker_conversion
      - REDIS_HOST=${REDIS_HOST:-job_queue}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - MINIO_CONTAINER_NAME=${MINIO_CONTAINER_NAME:-minio}
      - MINIO_API_PORT=${MINIO_API_PORT:-9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-yourpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-xtractyl}
      - DOCLING_CONTAINER_NAME=${DOCLING_CONTAINER_NAME:-docling}
      - DOCLING_PORT=${DOCLING_PORT:-5004}
      - ORCH_CONTAINER_NAME=${ORCH_CONTAINER_NAME:-orchestrator}
      - ORCH_PORT=${ORCH_PORT:-5001}
      - DEBUG_ARTIFACTS=${DEBUG_ARTIFACTS:-0}
      - LOGS_DIR=/app/logs
      - DEV_LOGS_DIR=/app/data/logs


# --- Xtractyl database (separate from labelsstudio postgres) ---
  postgres_xtractyl:
    image: postgres@sha256:c189d272e4fcdd1ac419adee675d30be3d389c22ee770d593f15819d22a68a0d
    container_name: ${POSTGRES_XTRACTYL_CONTAINER_NAME:-postgres_xtractyl}
    restart: unless-stopped
    ports:
      - "${POSTGRES_XTRACTYL_PORT:-5433}:5432"
    volumes:
      - ${PGDATA_XTRACTYL_VOLUME:-pgdata_xtractyl}:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_XTRACTYL_DB:-xtractyl}
      POSTGRES_USER: ${POSTGRES_XTRACTYL_USER:-xtractyl}
      POSTGRES_PASSWORD: ${POSTGRES_XTRACTYL_PASSWORD:-yourpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_XTRACTYL_USER:-xtractyl} -d ${POSTGRES_XTRACTYL_DB:-xtractyl}"]
      interval: 5s
      retries: 5
      timeout: 5s

  # --- Object Storage ---
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: ${MINIO_CONTAINER_NAME:-minio}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_VOLUME:-minio_data}:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Admin GUI for Xtractyl Postgres ---
  # access only to xtractyl database to avoid damaging label studio database 
  pgadmin:
    image: dpage/pgadmin4@sha256:cefc4cc6b7d9d71a9e81e76fb9d7e14038ab5661b539a190eea1b63fa612589a
    container_name: ${PGADMIN_CONTAINER_NAME:-pgadmin}
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@xtractyl.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-yourpassword}
    depends_on:
      postgres_xtractyl:
        condition: service_healthy

volumes:
  labelstudio_data:
  pgdata:
  pgdata_xtractyl:  
  minio_data:
  ollama_models:
  fontcache:
  xdg_cache:
  xdg_data:
  redis_data: