name: Unit

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.10"

      - run: python -m pip install --upgrade pip

      - name: Install deps
        run: make deps

      - name: Run unit tests for orchestrator
        run: make unit-orchestrator